        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #16213e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h2 {
            text-align: center;
            color: #e94560;
            margin-top: 0;
        }
        .section-title {
            margin-top: 20px;
            border-left: 4px solid #e94560;
            padding-left: 10px;
            font-size: 18px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        .item {
            background: #0f3460;
            padding: 15px 5px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .item:hover {
            border-color: #e94560;
            transform: translateY(-5px);
        }
        .item img {
            width: 32px;
            height: 32px;
            margin-bottom: 8px;
            filter: brightness(0) invert(1); /* makes icons white to fit dark theme, optional */
        }
        /* remove filter for colored icons - let's use original colors */
        .item img {
            filter: none; /* keep original colors */
        }
        .platform-name {
            font-weight: 500;
            font-size: 16px;
        }
        .price {
            display: block;
            color: #4cd137;
            font-weight: bold;
            margin-top: 4px;
            font-size: 13px;
            word-break: break-word;
        }
        .buy-btn {
            width: 100%;
            padding: 15px;
            margin-top: 25px;
            border: none;
            border-radius: 8px;
            background-color: #e94560;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            box-sizing: border-box;
            transition: background-color 0.3s;
        }
        .buy-btn:hover {
            background-color: #ff2e63;
        }
        a.buy-btn {
            text-decoration: none;
            color: white;
        }
        /* Adjust grid for smaller screens */
        @media (max-width: 400px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
